<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — digifyCX Ops Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ── Topbar ── -->
<header class="topbar">
  <a class="topbar-brand" href="index.html">
    <div class="brand-dot"><i class="ti ti-cpu"></i></div>
    digifyCX Ops Portal
  </a>
  <nav class="topbar-nav">
    <a class="nav-btn" href="index.html"><i class="ti ti-layout-dashboard"></i> <span>Dashboard</span></a>
    <a class="nav-btn" href="new-request.html"><i class="ti ti-plus"></i> <span>New request</span></a>
    <a class="nav-btn" href="tracker.html"><i class="ti ti-list-check"></i> <span>Tracker</span></a>
   
  </nav>
</header>

<!-- ── Page ── -->
<main class="page">

  <div class="page-header">
    <div>
      <div class="page-title">Operations overview</div>
      <div class="page-sub">Live request intelligence</div>
    </div>
    <a class="btn btn-primary btn-sm" href="new-request.html"><i class="ti ti-plus"></i> New request</a>
  </div>

  <!-- Stats -->
  <div class="stat-grid">
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total requests</div></div>
    <div class="stat"><div class="stat-num" id="s-open">0</div><div class="stat-label">Open</div></div>
    <div class="stat"><div class="stat-num" id="s-urgent">0</div><div class="stat-label">High / Critical</div></div>
    <div class="stat"><div class="stat-num" id="s-resolved">0</div><div class="stat-label">Resolved</div></div>
  </div>

  <!-- Recent requests -->
  <div class="card">
    <div class="card-title"><i class="ti ti-activity"></i> Recent requests</div>
    <div id="dash-list">
      <div class="empty"><i class="ti ti-inbox"></i><p>No requests yet. <a href="new-request.html" style="color:var(--text-accent)">Submit your first one.</a></p></div>
    </div>
  </div>

  <!-- Activity log -->
  <div class="card">
    <div class="card-title"><i class="ti ti-terminal-2"></i> Activity log</div>
    <div id="activity-log">
      <div class="empty" style="padding:20px"><p style="font-size:13px">Activity appears here as you use the portal.</p></div>
    </div>
  </div>

</main>

<!-- Toast -->
<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toast-msg"></span></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-head">
      <span id="modal-title" style="font-weight:500;font-size:15px"></span>
      <button class="btn btn-sm" id="modal-close" style="padding:4px 8px"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<script src="utils.js"></script>
<script>
  function renderDashboard() {
    const reqs = getRequests();
    document.getElementById('s-total').textContent = reqs.length;
    document.getElementById('s-open').textContent = reqs.filter(r => r.status === 'Open').length;
    document.getElementById('s-urgent').textContent = reqs.filter(r => r.ai && (r.ai.urgency === 'High' || r.ai.urgency === 'Critical')).length;
    document.getElementById('s-resolved').textContent = reqs.filter(r => r.status === 'Resolved').length;

    const list = document.getElementById('dash-list');
    if (!reqs.length) {
      list.innerHTML = '<div class="empty"><i class="ti ti-inbox"></i><p>No requests yet. <a href="new-request.html" style="color:var(--text-accent)">Submit your first one.</a></p></div>';
      return;
    }
    list.innerHTML = reqs.slice(0, 8).map(r => `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer" onclick="openTicket('${r.id}')">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500">${r.title}</div>
          <div style="font-size:12px;color:var(--text-muted)">${r.id} · ${r.name} · ${r.created}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          ${r.ai ? urgBadge(r.ai.urgency) : ''}
          ${statusBadge(r.status)}
        </div>
      </div>
    `).join('');
  }

  function renderLog() {
    const log = getLog();
    const el = document.getElementById('activity-log');
    if (!log.length) {
      el.innerHTML = '<div class="empty" style="padding:20px"><p style="font-size:13px">No activity yet.</p></div>';
      return;
    }
    el.innerHTML = log.map(l => `
      <div class="log-entry">
        <span class="log-time">${l.time}</span>
        <span style="font-size:13px">${l.msg}</span>
      </div>
    `).join('');
  }

  function openTicket(id) {
    const reqs = getRequests();
    const r = reqs.find(x => x.id === id);
    if (!r) return;

    document.getElementById('modal-title').textContent = `${r.id} — ${r.title}`;
    document.getElementById('modal-body').innerHTML = `
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
        ${statusBadge(r.status)}
        ${r.ai ? urgBadge(r.ai.urgency) : ''}
        ${r.ai ? `<span class="badge badge-gray">${r.ai.category}</span>` : ''}
      </div>
      <div class="detail-grid">
        <div class="detail-row"><div class="detail-label">Requestor</div><div class="detail-val">${r.name}</div></div>
        <div class="detail-row"><div class="detail-label">Email</div><div class="detail-val">${r.email}</div></div>
        <div class="detail-row"><div class="detail-label">Type</div><div class="detail-val">${r.type}</div></div>
        <div class="detail-row"><div class="detail-label">Priority</div><div class="detail-val">${r.priority}</div></div>
        <div class="detail-row"><div class="detail-label">System</div><div class="detail-val">${r.system || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Target date</div><div class="detail-val">${r.target_date || '—'}</div></div>
      </div>
      <div style="font-size:13px;color:var(--text-secondary);line-height:1.7;padding:12px;background:var(--surface-1);border-radius:var(--radius);margin-bottom:16px">${r.description}</div>
      ${r.ai ? `
        <div class="ai-panel" style="margin-bottom:16px">
          <div class="ai-label"><i class="ti ti-brain"></i> AI analysis</div>
          <div style="font-size:13px;line-height:1.7;margin-bottom:10px">${r.ai.summary}</div>
          <div style="font-size:13px;margin-bottom:10px"><strong>Next action:</strong> ${r.ai.next_action}</div>
          ${r.ai.clarification_needed ? `<div style="padding:10px;background:var(--bg-warning);border-radius:var(--radius);font-size:13px;color:var(--text-warning);margin-bottom:10px"><i class="ti ti-help-circle"></i> ${r.ai.clarification_question}</div>` : ''}
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <span class="badge badge-gray">Effort: ${r.ai.estimated_effort}</span>
            <span class="badge badge-gray">Confidence: ${r.ai.confidence}%</span>
          </div>
        </div>
      ` : ''}
      <div style="font-size:13px;font-weight:500;margin-bottom:8px">History</div>
      ${r.history.map(h => `<div class="log-entry"><span class="log-time">${h.time}</span><span style="font-size:13px">${h.event}</span></div>`).join('')}
    `;

    document.getElementById('modal-foot').innerHTML = `
      <select onchange="updateStatus('${r.id}', this.value)" class="filter-select">
        <option ${r.status === 'Open' ? 'selected' : ''}>Open</option>
        <option ${r.status === 'In progress' ? 'selected' : ''}>In progress</option>
        <option ${r.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
      </select>
      <button class="btn btn-sm" id="close-modal-btn">Close</button>
    `;

    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('close-modal-btn').onclick = closeModal;
  }

  function updateStatus(id, val) {
    const reqs = getRequests();
    const r = reqs.find(x => x.id === id);
    if (!r) return;
    r.status = val;
    r.history.push({ time: ts(), event: `Status changed to ${val}`, by: 'User' });
    saveRequests(reqs);
    addLog(`${id} status → ${val}`);
    renderDashboard();
    renderLog();
    toast(`${id} updated to ${val}`);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.getElementById('modal-close').onclick = closeModal;

  renderDashboard();
  renderLog();
</script>
</body>
</html>
