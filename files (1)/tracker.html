<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracker — digifyCX Ops Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ── Topbar ── -->
<header class="topbar">
  <a class="topbar-brand" href="dashboard.html">
    <div class="brand-dot"><i class="ti ti-cpu"></i></div>
    digifyCX Ops Portal
  </a>
  <nav class="topbar-nav">
    <a class="nav-btn" href="dashboard.html"><i class="ti ti-layout-dashboard"></i> <span>Dashboard</span></a>
    <a class="nav-btn" href="new-request.html"><i class="ti ti-plus"></i> <span>New request</span></a>
    <a class="nav-btn" href="tracker.html"><i class="ti ti-list-check"></i> <span>Tracker</span></a>
    <a class="nav-btn" href="handover.html"><i class="ti ti-file-text"></i> <span>Handover</span></a>
  </nav>
</header>

<!-- ── Page ── -->
<main class="page">

  <div class="page-header">
    <div>
      <div class="page-title">Request tracker</div>
      <div class="page-sub">All submitted requests with AI-structured data</div>
    </div>
    <div style="display:flex;gap:8px">
      <select class="filter-select" id="fil-status" onchange="renderTracker()">
        <option value="">All status</option>
        <option>Open</option>
        <option>In progress</option>
        <option>Resolved</option>
      </select>
      <select class="filter-select" id="fil-urg" onchange="renderTracker()">
        <option value="">All urgency</option>
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
        <option>Critical</option>
      </select>
    </div>
  </div>

  <div id="tracker-list"></div>

</main>

<!-- Toast -->
<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toast-msg"></span></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-head">
      <span id="modal-title" style="font-weight:500;font-size:15px"></span>
      <button class="btn btn-sm" id="modal-close" style="padding:4px 8px"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<script src="utils.js"></script>
<script>
  function renderTracker() {
    const sf  = document.getElementById('fil-status').value;
    const uf  = document.getElementById('fil-urg').value;
    const all = getRequests();

    const filtered = all.filter(r =>
      (!sf || r.status === sf) &&
      (!uf || (r.ai && r.ai.urgency === uf))
    );

    const el = document.getElementById('tracker-list');

    if (!filtered.length) {
      el.innerHTML = `
        <div class="empty">
          <i class="ti ti-list-check"></i>
          <p>${all.length ? 'No requests match the current filters.' : 'No requests yet. <a href="new-request.html" style="color:var(--text-accent)">Submit your first one.</a>'}</p>
        </div>`;
      return;
    }

    el.innerHTML = filtered.map(r => `
      <div class="ticket-card" onclick="openTicket('${r.id}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px">
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:2px">${r.id}</div>
            <div style="font-size:14px;font-weight:500">${r.title}</div>
            <div style="font-size:12px;color:var(--text-muted)">${r.name} · ${r.type} · ${r.created}</div>
          </div>
          <div style="display:flex;gap:6px;flex-direction:column;align-items:flex-end;flex-shrink:0">
            ${statusBadge(r.status)}
            ${r.ai ? urgBadge(r.ai.urgency) : ''}
          </div>
        </div>
        ${r.ai ? `<div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;line-height:1.5">${r.ai.summary.substring(0, 140)}...</div>` : ''}
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          ${r.ai ? `<span class="badge badge-gray"><i class="ti ti-cpu"></i> ${r.ai.category}</span>` : ''}
          ${r.ai ? `<span class="badge badge-gray"><i class="ti ti-clock"></i> ${r.ai.estimated_effort}</span>` : ''}
          <span style="margin-left:auto;font-size:12px;color:var(--text-accent)">View details →</span>
        </div>
      </div>
    `).join('');
  }

  function openTicket(id) {
    const reqs = getRequests();
    const r = reqs.find(x => x.id === id);
    if (!r) return;

    document.getElementById('modal-title').textContent = `${r.id} — ${r.title}`;
    document.getElementById('modal-body').innerHTML = `
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
        ${statusBadge(r.status)}
        ${r.ai ? urgBadge(r.ai.urgency) : ''}
        ${r.ai ? `<span class="badge badge-gray">${r.ai.category}</span>` : ''}
      </div>
      <div class="detail-grid">
        <div class="detail-row"><div class="detail-label">Requestor</div><div class="detail-val">${r.name}</div></div>
        <div class="detail-row"><div class="detail-label">Email</div><div class="detail-val">${r.email}</div></div>
        <div class="detail-row"><div class="detail-label">Type</div><div class="detail-val">${r.type}</div></div>
        <div class="detail-row"><div class="detail-label">Priority</div><div class="detail-val">${r.priority}</div></div>
        <div class="detail-row"><div class="detail-label">System</div><div class="detail-val">${r.system || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Target date</div><div class="detail-val">${r.target_date || '—'}</div></div>
      </div>
      <div style="font-size:13px;color:var(--text-secondary);line-height:1.7;padding:12px;background:var(--surface-1);border-radius:var(--radius);margin-bottom:16px">${r.description}</div>
      ${r.ai ? `
        <div class="ai-panel" style="margin-bottom:16px">
          <div class="ai-label"><i class="ti ti-brain"></i> AI analysis</div>
          <div style="font-size:13px;line-height:1.7;margin-bottom:10px">${r.ai.summary}</div>
          <div style="font-size:13px;margin-bottom:10px"><strong>Next action:</strong> ${r.ai.next_action}</div>
          ${r.ai.clarification_needed ? `
            <div style="padding:10px;background:var(--bg-warning);border-radius:var(--radius);font-size:13px;color:var(--text-warning);margin-bottom:10px">
              <i class="ti ti-help-circle"></i> ${r.ai.clarification_question}
            </div>
          ` : ''}
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <span class="badge badge-gray">Effort: ${r.ai.estimated_effort}</span>
            <span class="badge badge-gray">Confidence: ${r.ai.confidence}%</span>
          </div>
        </div>
      ` : ''}
      <div style="font-size:13px;font-weight:500;margin-bottom:8px">History</div>
      ${r.history.map(h => `
        <div class="log-entry">
          <span class="log-time">${h.time}</span>
          <span style="font-size:13px">${h.event}</span>
        </div>
      `).join('')}
    `;

    document.getElementById('modal-foot').innerHTML = `
      <select onchange="updateStatus('${r.id}', this.value)" class="filter-select">
        <option ${r.status === 'Open' ? 'selected' : ''}>Open</option>
        <option ${r.status === 'In progress' ? 'selected' : ''}>In progress</option>
        <option ${r.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
      </select>
      <button class="btn btn-sm" id="close-modal-btn">Close</button>
    `;

    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('close-modal-btn').onclick = closeModal;
  }

  function updateStatus(id, val) {
    const reqs = getRequests();
    const r = reqs.find(x => x.id === id);
    if (!r) return;
    r.status = val;
    r.history.push({ time: ts(), event: `Status changed to ${val}`, by: 'User' });
    saveRequests(reqs);
    addLog(`${id} status → ${val}`);
    renderTracker();
    toast(`${id} updated to ${val}`);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.getElementById('modal-close').onclick = closeModal;

  renderTracker();
</script>
</body>
</html>
